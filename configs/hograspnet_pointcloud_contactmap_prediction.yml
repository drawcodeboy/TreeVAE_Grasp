run_name: 'hograspnet_pointcloud_contactmap_prediction'

data:
  data_name: 'hograspnet_contact'
  mode: 'prediction'
  root: '/workspace/dwkwon/HOGraspNet/processed_data/hand_pose_plus_mano_contact'
  num_clusters_data: 28 # number of classes

training:
  modal: 'pointcloud_contactmap_prediction'
  downsampling_factors: [2, 2, 2, 2]
  n_ary: 5
  num_epochs: 150 # original 150 in CelebA
  num_epochs_smalltree: 150 # original 150 in CelebA
  num_epochs_intermediate_fulltrain: 0 # original 0 in CelebA
  num_epochs_finetuning: 0 # original 0 in CelebA
  batch_size: 256 # original 256, reduced for OOM issues
  lr: 0.001
  weight_decay: 0.00001
  decay_lr: 0.1
  decay_stepsize: 100
  decay_kl: 0.01
  kl_start: 0.01

  inp_shape: 12288 # 2D image 쪽 args -> 안 씀
  latent_dim:  [64,64,64,64,64,64] 
  mlp_layers: [4096, 512, 512, 512, 512, 512] 
  initial_depth: 1
  activation: 'mae'
  encoder: 
    architecture: 'pointnet'
    num_points: 1556
  decoder:
    architecture: 'mlp'
    input_shape: 64 # latent_dim과 동일
    output_shape: 778
    activation: 'sigmoid'

  grow: True
  prune: True
  num_clusters_tree: 50 # 트리가 가질 수 있는 최대 leaf 노드 수 (즉, 트리의 최대 크기)
  augment: True
  augmentation_method: 'InfoNCE,instancewise_full' 
  aug_decisions_weight: 1 # orignal 100, -> 너무 aggressive한 setting 같아서 우선 줄여서
  compute_ll: False

parser:
  num_workers: 2

globals:
  wandb_logging: 'online'
  eager_mode: False
  seed: 42
  save_model: True
  resume_from:
  config_name: 'hograspnet_pointcloud_contactmap_prediction'
