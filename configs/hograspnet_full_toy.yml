run_name: 'hograspnet_full_toy'

data:
  data_name: 'hograspnet_full_toy'
  root: '/workspace/lab_intern/KDW/GraspRep/data/DexGraspNet/pointcloud'
  setup: 'full'
  test_ratio: 0.15
  split_trials: 100
  num_clusters_data: 28 # number of classes

training:
  n_ary: 3
  num_epochs: 150
  num_epochs_smalltree: 150
  num_epochs_intermediate_fulltrain: 0
  num_epochs_finetuning: 0
  batch_size: 128 # original 256, reduced for OOM issues
  lr: 0.001
  weight_decay: 0.00001
  decay_lr: 0.1
  decay_stepsize: 100
  decay_kl: 0.01
  kl_start: 0.01

  inp_shape: 12288
  latent_dim:  [64,64,64,64,64,64] 
  mlp_layers: [4096, 512, 512, 512, 512, 512] 
  initial_depth: 1
  activation: 'mse'
  encoder: 
    architecture: 'pointnet'
    num_points: 4096
  decoder:
    architecture: 'pointnet'
    num_points: 4096

  grow: True
  prune: True
  num_clusters_tree: 10 # 트리가 가질 수 있는 최대 leaf 노드 수 (즉, 트리의 최대 크기)
  augment: True
  augmentation_method: 'InfoNCE,instancewise_full' 
  aug_decisions_weight: 100
  compute_ll: False

parser:
  num_workers: 2

globals:
  wandb_logging: 'disabled'
  eager_mode: False
  seed: 42
  save_model: True
  config_name: 'dexgraspnet_toy'