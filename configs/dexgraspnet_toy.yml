run_name: 'dexgraspnet_toy'

data:
  data_name: 'dexgraspnet_toy'
  data_dir: '/workspace/lab_intern/KDW/GraspRep/data/DexGraspNet/pointcloud'
  num_clusters_data: 1
  split_mode: 'object'  # 'object' preserves unseen-object split; 'within_object' splits grasps within each object
  n_objs: 500
  grasps_per_obj: 50

training:
  num_epochs: 150
  num_epochs_smalltree: 150
  num_epochs_intermediate_fulltrain: 0
  num_epochs_finetuning: 0
  batch_size: 256
  lr: 0.001
  weight_decay: 0.00001
  decay_lr: 0.1
  decay_stepsize: 100
  decay_kl: 0.01
  kl_start: 0.01

  inp_shape: 12288
  latent_dim:  [64,64,64,64,64,64] 
  mlp_layers: [4096, 512, 512, 512, 512, 512] 
  initial_depth: 1
  activation: 'mse'
  encoder: 
    architecture: 'pointnet'
    num_points: 4096
  decoder:
    architecture: 'pointnet'
    num_points: 4096

  grow: True
  prune: True
  num_clusters_tree: 10
  augment: True
  augmentation_method: 'InfoNCE,instancewise_full' 
  aug_decisions_weight: 100
  compute_ll: False

globals:
  wandb_logging: 'disabled'
  eager_mode: False
  seed: 42
  save_model: True
  config_name: 'dexgraspnet_toy'